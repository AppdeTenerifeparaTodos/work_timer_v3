name: work_timer_v4
description: "Track your time, achieve your goals. Productivity timer with statistics and goal tracking."
publish_to: 'none'

version: 1.1.8+18

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.2.0
  path_provider: ^2.1.0
  image_picker: ^1.1.2
  fl_chart: ^0.69.0
  share_plus: ^10.0.0
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4
  speech_to_text: 7.0.0
  audioplayers: ^6.1.0
  permission_handler: ^11.3.1
  alarm: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/sounds/

generate: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/WT.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/WT.png"
  min_sdk_android: 21